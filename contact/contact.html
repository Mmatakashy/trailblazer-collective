
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Trailblazers Collective</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Contact Us</h1>
      <p>We’d love to hear from you. Reach out anytime.</p>
    </div>
  </section>

  <!-- Contact Section -->
  <section class="contact-container">
    <div class="contact-grid">

      <!-- Left: Image with Contact Info -->
      <div class="contact-info">
        <div class="overlay">
          <h2>Get in Touch</h2>
          <p><strong>Email:</strong> contact@trailblaers.org</p>
          <p><strong>Phone:</strong> +254 712 345 678</p>
          <p><strong>Working Hours:</strong><br>Mon - Fri, 9:00am - 5:00pm</p>
          <p><strong>We usually respond within 24 hours.</strong></p>
        </div>
      </div>

      <!-- Right: Contact Form -->
      <div class="contact-form">
        <h2>Send us a message</h2>
        <form>
          <input type="text" name="name" placeholder="Your Name" required />
          <input type="email" name="email" placeholder="Your Email" required />
          <textarea name="message" placeholder="Your Message" required></textarea>
          <button type="submit">Send Message</button>
        </form>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 Trailblazers. All rights reserved.</p>
  </footer>

</body>
</html>
